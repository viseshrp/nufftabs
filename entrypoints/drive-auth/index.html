<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nufftabs Drive connection</title>
  <link rel="stylesheet" href="../shared/theme.css">
</head>

<body>
  <main class="auth-page">
    <section class="auth-card" aria-labelledby="driveAuthTitle">
      <h1 id="driveAuthTitle">Google Drive backup</h1>
      <p class="auth-copy">
        Connect your Google account to enable manual nufftabs backups to Drive.
      </p>
      <div id="authStatus" class="auth-status" role="status" aria-live="polite"></div>
      <div class="auth-actions">
        <button id="connectDrive" type="button">Connect</button>
        <button id="disconnectDrive" type="button" class="secondary">Disconnect</button>
      </div>
    </section>
  </main>
  <script type="module" src="./index.ts"></script>
</body>

</html>
