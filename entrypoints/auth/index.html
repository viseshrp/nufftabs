<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Google Drive</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--bg-color, #f9f9f9);
      color: var(--text-color, #333);
      font-family: system-ui, sans-serif;
      margin: 0;
    }
    .card {
      background: var(--card-bg, #fff);
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .status {
      margin: 1.5rem 0;
      font-weight: 500;
    }
    .user-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #eee;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    button {
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    .primary {
      background-color: var(--primary-color, #4285f4);
      color: white;
    }
    .primary:hover {
      background-color: var(--primary-hover, #3367d6);
    }
    .secondary {
      background-color: transparent;
      color: var(--text-color, #333);
      border: 1px solid var(--border-color, #ccc);
    }
    .secondary:hover {
      background-color: var(--hover-bg, rgba(0,0,0,0.05));
    }
    .error {
        color: #d32f2f;
        margin-top: 1rem;
        font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Google Drive Backup</h1>
    <div id="status" class="status">Checking connection...</div>
    <div id="userInfo" class="user-info" hidden>
        <img id="userAvatar" class="avatar" alt="" />
        <span id="userName"></span>
    </div>
    <div class="actions">
      <button id="connectBtn" class="primary" hidden>Connect with Google</button>
      <button id="disconnectBtn" class="secondary" hidden>Disconnect</button>
    </div>
    <div id="error" class="error"></div>
  </div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
