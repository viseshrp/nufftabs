<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="manifest.openInTab" content="true" />
  <title>nufftabs options</title>
  <link rel="stylesheet" href="../shared/theme.css">
</head>

<body>
  <main class="app">
    <header>
      <h1>nufftabs options</h1>
      <p class="subtitle">Settings</p>
    </header>
    <section class="settings">
      <div class="setting-group" role="group" aria-labelledby="themeLabel">
        <div id="themeLabel" class="setting-label">Theme</div>
        <label class="setting-radio">
          <input id="themeOs" type="radio" name="theme" value="os" checked />
          <span>System</span>
        </label>
        <label class="setting-radio">
          <input id="themeLight" type="radio" name="theme" value="light" />
          <span>Light</span>
        </label>
        <label class="setting-radio">
          <input id="themeDark" type="radio" name="theme" value="dark" />
          <span>Dark</span>
        </label>
      </div>
      <label class="setting">
        <input id="excludePinned" type="checkbox" />
        <span>Exclude pinned tabs</span>
      </label>
      <label class="setting">
        <span>Tabs per restore window</span>
        <input id="restoreBatchSize" type="number" min="1" step="1" placeholder="100" />
      </label>
      <div class="setting-group" role="group" aria-labelledby="discardRestoredTabsLabel">
        <div id="discardRestoredTabsLabel" class="setting-label">Save memory when restoring tabs</div>
        <p class="setting-help">
          When enabled, restored tabs are immediately unloaded to save RAM and will load when you click them.
        </p>
        <label class="setting-radio">
          <input id="discardRestoredTabsDisabled" type="radio" name="discardRestoredTabs" value="false" checked />
          <span>Disabled</span>
        </label>
        <label class="setting-radio">
          <input id="discardRestoredTabsEnabled" type="radio" name="discardRestoredTabs" value="true" />
          <span>Enabled</span>
        </label>
      </div>
    </section>
    <section class="settings drive-backup" aria-labelledby="driveBackupTitle">
      <h2 id="driveBackupTitle">Google Drive backup</h2>
      <p class="setting-help">
        Manual backup only. Nothing is uploaded unless you click Backup now.
      </p>
      <div class="drive-controls">
        <button id="openDriveAuth" type="button">Connect to Google Drive</button>
        <button id="backupNow" type="button">Backup now</button>
      </div>
      <label class="setting">
        <span>Retention (backups kept)</span>
        <input id="driveRetentionCount" type="number" min="1" max="500" step="1" placeholder="30" />
      </label>
      <div class="drive-list-wrap">
        <table class="drive-list-table">
          <thead>
            <tr>
              <th>When</th>
              <th>Groups</th>
              <th>Size</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="driveBackupList"></tbody>
        </table>
      </div>
      <div id="driveStatus" class="status drive-status" role="status" aria-live="polite"></div>
    </section>
    <div id="status" class="status" role="status" aria-live="polite"></div>
  </main>
  <script type="module" src="./index.ts"></script>
</body>

</html>
